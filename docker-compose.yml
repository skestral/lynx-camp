services:
  campfinder:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${CAMPFINDER_NODE_VERSION:-22-alpine}
        PYTHON_VERSION: ${CAMPFINDER_PYTHON_VERSION:-3.12-slim}
        APP_GIT_SHA: ${APP_GIT_SHA:-${GITHUB_SHA:-${COMMIT_SHA:-unknown}}}
    image: ${CAMPFINDER_LOCAL_IMAGE:-lynx-camp:local}
    container_name: campfinder
    ports:
      - "8080:8080"
    volumes:
      - campfinder-data:/data
    environment:
      CAMPFINDER_DB: /data/campfinder.db
      CAMPFINDER_APP_BASE_URL: ${CAMPFINDER_APP_BASE_URL:-http://localhost:8080}
      CAMPFINDER_MIN_POLL_INTERVAL_MINUTES: ${CAMPFINDER_MIN_POLL_INTERVAL_MINUTES:-10}
      CAMPFINDER_RELEASE_SCAN_BEFORE_MINUTES: ${CAMPFINDER_RELEASE_SCAN_BEFORE_MINUTES:-15}
      CAMPFINDER_RELEASE_SCAN_AFTER_MINUTES: ${CAMPFINDER_RELEASE_SCAN_AFTER_MINUTES:-60}
      CAMPFINDER_RELEASE_SCAN_INTERVAL_MINUTES: ${CAMPFINDER_RELEASE_SCAN_INTERVAL_MINUTES:-10}
      CAMPFINDER_AVAILABILITY_CACHE_MINUTES: ${CAMPFINDER_AVAILABILITY_CACHE_MINUTES:-5}
      CAMPFINDER_API_REQUEST_DELAY_SECONDS: ${CAMPFINDER_API_REQUEST_DELAY_SECONDS:-1}
      CAMPFINDER_RATE_LIMIT_BACKOFF_MINUTES: ${CAMPFINDER_RATE_LIMIT_BACKOFF_MINUTES:-60}
      CAMPFINDER_MAX_NOTIFICATION_RESULTS: ${CAMPFINDER_MAX_NOTIFICATION_RESULTS:-5}
      CAMPFINDER_WEBHOOK_URL: ${CAMPFINDER_WEBHOOK_URL:-}
      CAMPFINDER_NTFY_SERVER: ${CAMPFINDER_NTFY_SERVER:-https://ntfy.sh}
      CAMPFINDER_NTFY_TOPIC: ${CAMPFINDER_NTFY_TOPIC:-}
      CAMPFINDER_NTFY_TOKEN: ${CAMPFINDER_NTFY_TOKEN:-}
      CAMPFINDER_NTFY_PRIORITY: ${CAMPFINDER_NTFY_PRIORITY:-high}
      CAMPFINDER_SMTP_HOST: ${CAMPFINDER_SMTP_HOST:-}
      CAMPFINDER_SMTP_PORT: ${CAMPFINDER_SMTP_PORT:-587}
      CAMPFINDER_SMTP_USERNAME: ${CAMPFINDER_SMTP_USERNAME:-}
      CAMPFINDER_SMTP_PASSWORD: ${CAMPFINDER_SMTP_PASSWORD:-}
      CAMPFINDER_SMTP_FROM: ${CAMPFINDER_SMTP_FROM:-}
      CAMPFINDER_SMTP_TO: ${CAMPFINDER_SMTP_TO:-}
    restart: unless-stopped

volumes:
  campfinder-data:
